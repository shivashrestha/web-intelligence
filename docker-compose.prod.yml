name: webin
version: "3.9"

services:
  webin-backend:
    container_name: webin-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      FRONTEND_ORIGIN: ""
    ports:
      - "18000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
