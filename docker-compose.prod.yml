version: "3.9"

services:
  backend:
    container_name: web-intelligence-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      FRONTEND_ORIGIN: ""
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
